<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, inital-scale=1.0">
        <title>CSS Methods</title>
        <link rel="stylesheet" href="style.css">
        <style>
            p{
                background-color: green; 
                color: white;
                font-size: 18px;

    </body>
</html>
