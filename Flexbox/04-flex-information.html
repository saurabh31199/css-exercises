<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Information</title>
    <link rel="stylesheet" href="04-flex-information.css">
</head>
<body>
    <div class="container">
        <h1>Information!</h1>
        <div class="info">
            <div class="item">
                <img src="barberry.png" alt="barberry">
                <p>This is a type of plant. We love this one.</p>
            </div>
            <div class="item">
                <img src="chilli.png" alt="chilli">
                <p>This is another type of plant. Isn't it nice?</p>
            </div>
            <div class="item">
                <img src="pepper.png" alt="pepper">
                <p>We have so many plants. Yay plants.</p>
            </div>
            <div class="item">
                <img src="saffron.png" alt="saffron">
                <p>I'm running out of things to say about plants.</p>
            </div>
        </div>
    </div>
</body>
</html>
